name: punjabi_keyboard
description: Punjabi (Gurmukhi) keyboard companion app with speech-to-text, emojis, and premium ad-free tier.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.2.2
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.0
  google_mobile_ads: ^5.0.0
  in_app_purchase: ^3.2.0
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/emojis/
